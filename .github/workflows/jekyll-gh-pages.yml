name: Deploy Website to GitHub Pages

# Trigger on push to main branch or manual run
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3️⃣ Upload website files (from GhostApp/www)
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: GhostApp/www

      # 4️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # optional: you can leave this empty, GitHub handles it automatically
          # if you have a custom domain, you can configure it here
